version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: koins-postgres
    restart: always
    environment:
      POSTGRES_DB: koins_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: koins-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"