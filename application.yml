server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/koins_db
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: your-secret-key
  expiration: 86400000